// ─────────────────────────────────────────────────────────────────
// PAGE: INFORMES
// ─────────────────────────────────────────────────────────────────
function pgInformes(el) {
  var cobros  = cobrosFiltered();
  var gastos2 = gastosFiltered();

  var ingresos  = cobros.filter(function(c){return c.estado==='cobrado';}).reduce(function(s,c){return s+c.monto;},0);
  var pendiente = cobros.filter(function(c){return c.estado==='pendiente';}).reduce(function(s,c){return s+c.monto;},0);
  var gastosTot = gastos2.reduce(function(s,g){return s+g.monto;},0);
  var resultado = ingresos - gastosTot;
  var alq = DB.inmuebles.filter(function(i){return i.estado==='alquilado';}).length;
  var ocupacion = DB.inmuebles.length ? Math.round(alq/DB.inmuebles.length*100) : 0;

  // Gastos por categoría
  var cats = ['Mantenimiento','Seguro','Administrativo','Impuestos','Honorarios'];
  var gastosCat = cats.map(function(cat){
    return gastos2.filter(function(g){return g.cat===cat;}).reduce(function(s,g){return s+g.monto;},0);
  });

  // Cobros por contrato
  var ctRows = DB.contratos.map(function(ct) {
    var inq=getInq(ct.inqId); var inm=getInm(ct.inmId);
    var ctCobros = cobros.filter(function(c){return c.ctId===ct.id;});
    var cobrado  = ctCobros.filter(function(c){return c.estado==='cobrado';}).reduce(function(s,c){return s+c.monto;},0);
    var pend     = ctCobros.filter(function(c){return c.estado==='pendiente';}).reduce(function(s,c){return s+c.monto;},0);
    return '<tr>' +
      '<td style="font-size:12px;font-family:monospace;color:var(--accent-dark)">'+h(ct.num)+'</td>' +
      '<td style="font-size:12px"><div style="font-weight:500">'+h(inm?inm.dir.split(',')[0]:'—')+'</div><div style="color:var(--text3)">'+h(inm?inm.tipo:'')+'</div></td>' +
      '<td>'+h(inq?inq.nombre:'—')+'</td>' +
      '<td style="font-size:12px">'+h(ct.inicio)+' → '+h(ct.fin)+'</td>' +
      '<td style="font-weight:500;color:var(--green)">'+fmtPeso(cobrado)+'</td>' +
      '<td style="font-weight:500;color:var(--accent-dark)">'+fmtPeso(pend)+'</td>' +
      '<td>'+statusBadge(ct.estado)+'</td>' +
      '</tr>';
  }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Sin contratos</td></tr>';

  // Cobros por mes (últimos 12)
  var mesesLabels = []; var mesesCobrado = []; var mesesPendiente = [];
  var hoy = new Date();
  for(var mi=11; mi>=0; mi--) {
    var d = new Date(hoy.getFullYear(), hoy.getMonth()-mi, 1);
    var tag = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var label = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]+' '+String(d.getFullYear()).slice(2);
    mesesLabels.push(label);
    var mc = cobros.filter(function(c){return (c.vence||'').startsWith(tag);});
    mesesCobrado.push(mc.filter(function(c){return c.estado==='cobrado';}).reduce(function(s,c){return s+c.monto;},0));
    mesesPendiente.push(mc.filter(function(c){return c.estado!=='cobrado';}).reduce(function(s,c){return s+c.monto;},0));
  }
  var maxMes = Math.max.apply(null, mesesCobrado.concat(mesesPendiente)) || 1;
  var chartH = 120;
  var barW = 28; var gap = 6; var totalW = mesesLabels.length*(barW*2+gap+4)-4;
  var chartBars = mesesLabels.map(function(label, i) {
    var xBase = i*(barW*2+gap+4);
    var h1 = Math.max(4, Math.round(mesesCobrado[i]/maxMes*chartH));
    var h2 = Math.max(mesesPendiente[i]>0?4:0, Math.round(mesesPendiente[i]/maxMes*chartH));
    return '<rect x="'+xBase+'" y="'+(chartH-h1)+'" width="'+barW+'" height="'+h1+'" fill="var(--green)" rx="3" opacity="0.8"/>' +
           '<rect x="'+(xBase+barW+4)+'" y="'+(chartH-h2)+'" width="'+barW+'" height="'+h2+'" fill="var(--accent)" rx="3" opacity="0.8"/>' +
           '<text x="'+(xBase+barW)+'" y="'+(chartH+14)+'" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="Arial">'+label+'</text>';
  }).join('');
  var chartSVG = '<svg viewBox="0 0 '+(totalW+4)+' '+(chartH+24)+'" style="width:100%;height:'+(chartH+24)+'px">'+chartBars+'</svg>';

  // Rentabilidad por inmueble
  var inmRows = DB.inmuebles.map(function(p) {
    var inmCobros = cobros.filter(function(c){
      var ct=getCt(c.ctId); return ct && ct.inmId===p.id && c.estado==='cobrado';
    });
    var inmGastos = gastos2.filter(function(g){return g.inmId===p.id;});
    var cobradoInm = inmCobros.reduce(function(s,c){return s+c.monto;},0);
    var gastadoInm = inmGastos.reduce(function(s,g){return s+g.monto;},0);
    var netInm = cobradoInm - gastadoInm;
    var statusMap = {alquilado:'badge-green',disponible:'badge-amber',mantenimiento:'badge-gray'};
    return '<tr>' +
      '<td><div style="font-weight:500;font-size:13px">'+h(p.dir.split(',')[0])+'</div>' +
      '<div style="font-size:11px;color:var(--text3)">'+h(p.tipo)+'</div></td>' +
      '<td><span class="badge '+(statusMap[p.estado]||'badge-gray')+'">'+h(p.estado)+'</span></td>' +
      '<td>'+fmtPeso(p.precio)+'/mes</td>' +
      '<td style="color:var(--green);font-weight:500">'+fmtPeso(cobradoInm)+'</td>' +
      '<td style="color:var(--red);font-weight:500">'+fmtPeso(gastadoInm)+'</td>' +
      '<td style="font-weight:600;color:'+(netInm>=0?'var(--green)':'var(--red)')+'">'+fmtPeso(netInm)+'</td>' +
      '</tr>';
  }).join('');

  el.innerHTML =
    '<div class="page-header">' +
    '<div><div class="page-title">Informes y analítica</div>' +
    '<div class="page-subtitle">'+filterLabel()+'</div></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-secondary" onclick="exportarInformeCSV()" style="font-size:12px">⬇ Exportar CSV</button>' +
    '</div></div>' +
    buildFilterBar('informes') +
    '<div class="page-content fade-in">' +

    // KPI top row
    '<div class="stats-grid" style="margin-bottom:20px">' +
    '<div class="stat-card" style="border-left:3px solid var(--green)"><div class="stat-label">Ingresos cobrados</div><div class="stat-value" style="color:var(--green)">$'+Math.round(ingresos/1000)+'k</div><div class="stat-sub">'+cobros.filter(function(c){return c.estado==='cobrado';}).length+' recibos</div></div>' +
    '<div class="stat-card" style="border-left:3px solid var(--accent)"><div class="stat-label">Por cobrar</div><div class="stat-value" style="color:var(--accent-dark)">$'+Math.round(pendiente/1000)+'k</div></div>' +
    '<div class="stat-card" style="border-left:3px solid var(--red)"><div class="stat-label">Gastos</div><div class="stat-value" style="color:var(--red)">$'+Math.round(gastosTot/1000)+'k</div></div>' +
    '<div class="stat-card" style="border-left:3px solid '+(resultado>=0?'var(--green)':'var(--red)')+'"><div class="stat-label">Resultado neto</div><div class="stat-value" style="color:'+(resultado>=0?'var(--green)':'var(--red)')+'">$'+Math.round(resultado/1000)+'k</div><div class="stat-sub">margen '+(ingresos?Math.round(resultado/ingresos*100):0)+'%</div></div>' +
    '<div class="stat-card"><div class="stat-label">Ocupación</div><div class="stat-value" style="color:var(--accent-dark)">'+ocupacion+'%</div><div style="margin-top:8px;height:6px;background:var(--surface2);border-radius:3px"><div style="width:'+ocupacion+'%;height:100%;background:var(--accent);border-radius:3px"></div></div></div>' +
    '</div>' +

    // Evolución mensual (bar chart)
    '<div class="card" style="margin-bottom:16px">' +
    '<div class="card-header"><div class="card-title">Evolución mensual — últimos 12 meses</div>' +
    '<div style="display:flex;gap:14px;font-size:12px;align-items:center">' +
    '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:var(--green);border-radius:2px;display:inline-block"></span>Cobrado</span>' +
    '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:var(--accent);border-radius:2px;display:inline-block"></span>Pendiente</span>' +
    '</div></div>' +
    chartSVG + '</div>' +

    // Two columns: gastos por cat + contratos
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' +

    // Gastos por categoría
    '<div class="card"><div class="card-header"><div class="card-title">Gastos por categoría</div></div>' +
    '<div style="display:flex;flex-direction:column;gap:8px">' +
    cats.map(function(cat, i) {
      var val = gastosCat[i]; if(!val) return '';
      return '<div style="display:flex;align-items:center;gap:10px">' +
        '<div style="width:90px;font-size:12px;color:var(--text2)">'+cat+'</div>' +
        '<div style="flex:1;height:8px;background:var(--surface2);border-radius:4px">' +
        '<div style="width:'+Math.round(val/(gastosTot||1)*100)+'%;height:100%;background:var(--red);border-radius:4px"></div></div>' +
        '<div style="width:65px;text-align:right;font-size:12px;font-weight:500">'+fmtPeso(val)+'</div></div>';
    }).join('') +
    (gastosTot===0 ? '<div style="font-size:13px;color:var(--text3)">Sin gastos en el período</div>' : '') +
    '</div></div>' +

    // Morosidad / estado de cobros
    '<div class="card"><div class="card-header"><div class="card-title">Estado de cobros</div></div>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' +
    [['cobrado','Cobrado','badge-green'],['pendiente','Pendiente','badge-amber'],['vencido','Vencido','badge-red']].map(function(s) {
      var list = cobros.filter(function(c){return c.estado===s[0];});
      var tot = list.reduce(function(acc,c){return acc+c.monto;},0);
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">' +
        '<span class="badge '+s[2]+'">'+s[1]+'</span>' +
        '<span style="font-size:12px;color:var(--text3)">'+list.length+' recibos</span>' +
        '<span style="font-weight:600;font-size:14px">'+fmtPeso(tot)+'</span></div>';
    }).join('') + '</div></div>' +
    '</div>' +

    // Rentabilidad por inmueble
    '<div class="card" style="margin-bottom:16px">' +
    '<div class="card-header"><div class="card-title">Rentabilidad por inmueble</div></div>' +
    '<div class="table-wrap"><table><thead><tr>' +
    '<th>Inmueble</th><th>Estado</th><th>Alquiler</th><th>Ingresos</th><th>Gastos</th><th>Resultado</th>' +
    '</tr></thead><tbody>'+inmRows+'</tbody></table></div></div>' +

    // Contratos
    '<div class="card">' +
    '<div class="card-header"><div class="card-title">Detalle por contrato</div></div>' +
    '<div class="table-wrap"><table><thead><tr>' +
    '<th>N° Contrato</th><th>Inmueble</th><th>Locatario</th><th>Período</th><th>Cobrado</th><th>Pendiente</th><th>Estado</th>' +
    '</tr></thead><tbody>'+ctRows+'</tbody></table></div></div>' +

    '</div>';
}

function exportarInformeCSV() {
  var cobros2 = cobrosFiltered();
  var rows = [['Período','Locatario','Inmueble','Monto','Vencimiento','Estado','Fecha Pago','Medio Pago']];
  cobros2.forEach(function(c) {
    var ct=getCt(c.ctId); var inq=ct?getInq(ct.inqId):null; var inm=ct?getInm(ct.inmId):null;
    rows.push([c.mes||'', inq?inq.nombre:'', inm?inm.dir:'', c.monto||0, c.vence||'', c.estado||'', c.fechaPago||'', c.medioPago||'']);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  a.download = 'Informe_PropManager_' + new Date().toISOString().split('T')[0] + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('CSV exportado', 'success');
}

function openReportarError() {
  var hoy = new Date().toLocaleString('es-AR');
  var pagina = PAGE || 'dashboard';
  var supaEstado = SUPA_READY ? 'Conectado' : 'Sin conexión';

  var bodyEl = document.createElement('div');
  bodyEl.innerHTML =
    '<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text3)">' +
    '<div style="margin-bottom:4px">📅 <strong>Fecha:</strong> ' + hoy + '</div>' +
    '<div style="margin-bottom:4px">📍 <strong>Sección:</strong> ' + h(pagina) + '</div>' +
    '<div>🔌 <strong>Supabase:</strong> ' + supaEstado + '</div>' +
    '</div>' +
    '<div class="form-grid">' +
    '<div class="form-field full"><label>¿Qué estabas haciendo cuando ocurrió el error? *</label>' +
    '<input id="rep-accion" type="text" placeholder="ej: Estaba agregando un inquilino y al guardar..."></div>' +
    '<div class="form-field full"><label>Descripción del error *</label>' +
    '<textarea id="rep-desc" style="min-height:100px" placeholder="Describí lo que pasó, qué mensaje de error apareció, si se repite..."></textarea></div>' +
    '<div class="form-field"><label>Tu nombre</label>' +
    '<input id="rep-nombre" type="text" placeholder="ej: María"></div>' +
    '<div class="form-field"><label>Prioridad</label>' +
    '<select id="rep-prio"><option value="normal">Normal — puedo seguir trabajando</option><option value="alta">Alta — bloquea mi trabajo</option><option value="critica">Crítica — la app no funciona</option></select></div>' +
    '</div>';

  var footer = modalFooter([{
    label: 'Enviar reporte',
    cls: 'btn-primary',
    action: function() {
      var accion = document.getElementById('rep-accion').value.trim();
      var desc   = document.getElementById('rep-desc').value.trim();
      var nombre = document.getElementById('rep-nombre').value.trim() || 'Usuario';
      var prio   = document.getElementById('rep-prio').value;

      if(!accion || !desc) { toast('Completá la acción y la descripción', 'error'); return; }

      var prioLabel = {normal:'Normal',alta:'Alta ⚠️',critica:'CRÍTICA 🚨'}[prio] || 'Normal';

      var asunto = encodeURIComponent('[PropManager] Error ' + prioLabel + ' — ' + pagina);
      var cuerpo = encodeURIComponent(
        'REPORTE DE ERROR - PropManager\n' +
        '================================\n\n' +
        'Fecha: ' + hoy + '\n' +
        'Seccion: ' + pagina + '\n' +
        'Supabase: ' + supaEstado + '\n' +
        'Prioridad: ' + prioLabel + '\n' +
        'Reportado por: ' + nombre + '\n\n' +
        'QUE ESTABA HACIENDO:\n' + accion + '\n\n' +
        'DESCRIPCION DEL ERROR:\n' + desc + '\n\n' +
        '================================\n' +
        'PropManager - Carolina Gerosa - Esquel, Chubut'
      );

      // Open email client with pre-filled report
      window.location.href = 'mailto:carolina.gerosa.parra@gmail.com?subject=' + asunto + '&body=' + cuerpo;

      // Also save the report locally
      if(!DB.reportes) DB.reportes = [];
      DB.reportes.push({
        fecha: hoy, pagina: pagina, accion: accion,
        desc: desc, nombre: nombre, prio: prio, enviado: true
      });

      closeModal();
      toast('Reporte preparado — se abrió tu app de email', 'success');
    }
  }]);

  openModal('Reportar un error', bodyEl, false, footer);
}

// También permitir reportar errores con un acceso rápido desde cualquier módulo
// (botón flotante visible solo en errores críticos — opcional activar)
function mostrarBotonError(mensajeError) {
  var existing = document.getElementById('floating-error-btn');
  if(existing) existing.remove();

  var btn = document.createElement('button');
  btn.id = 'floating-error-btn';
  btn.style.cssText = 'position:fixed;bottom:60px;right:24px;z-index:150;background:var(--red);color:white;border:none;border-radius:50px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(184,58,46,.4);display:flex;align-items:center;gap:8px;font-family:var(--sans);animation:fadeIn .3s ease';
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Reportar este error';
  btn.onclick = function() { openReportarError(); };
  document.body.appendChild(btn);

  // Auto-hide after 30 seconds
  setTimeout(function() {
    if(btn.parentNode) btn.style.opacity = '0';
    setTimeout(function() { if(btn.parentNode) btn.parentNode.removeChild(btn); }, 500);
  }, 30000);
}
