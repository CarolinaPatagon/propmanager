<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

:root {
  /* Palette — warm slate / gold luxury real estate */
  --bg:           #F7F5F2;
  --surface:      #FDFCFA;
  --surface2:     #F0EDE7;
  --surface3:     #E8E3DB;
  --border:       #DDD8CF;
  --border2:      #C9C3B8;

  --text:         #1C1915;
  --text2:        #5A5449;
  --text3:        #9B9287;

  --gold:         #B8924A;
  --gold-light:   #F5EDD9;
  --gold-dark:    #8A6A30;
  --gold-mid:     #D4AD72;

  --green:        #2E6E4A;
  --green-light:  #D6EDE1;
  --red:          #B83A2E;
  --red-light:    #F5D8D4;
  --blue:         #2B5C9E;
  --blue-light:   #D4E2F5;
  --purple:       #6B42B8;
  --purple-light: #E8DAFC;

  --sidebar-bg:   #1C1915;
  --sidebar-surf: #252118;
  --sidebar-border:#2E2A24;
  --sidebar-text: #C9C3B8;
  --sidebar-text2:#9B9287;
  --sidebar-act:  #B8924A;

  --serif:  'Playfair Display', Georgia, serif;
  --sans:   'Plus Jakarta Sans', system-ui, sans-serif;

  --radius:    10px;
  --radius-lg: 16px;
  --radius-xl: 22px;

  --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 1px 4px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
  --shadow-xl: 0 12px 40px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);

  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; }

/* ── LAYOUT ── */
.app { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:232px; background:var(--sidebar-bg); display:flex; flex-direction:column; flex-shrink:0; border-right:1px solid var(--sidebar-border); }
.main { flex:1; overflow-y:auto; display:flex; flex-direction:column; background:var(--bg); }

/* ── SIDEBAR ── */
.sidebar-logo {
  padding:24px 20px 20px;
  border-bottom:1px solid var(--sidebar-border);
  background: linear-gradient(160deg,#252118 0%, #1C1915 100%);
  position:relative;
  overflow:hidden;
}
.sidebar-logo::before {
  content:'';
  position:absolute;
  top:-30px; right:-30px;
  width:100px; height:100px;
  background: radial-gradient(circle, rgba(184,146,74,.18) 0%, transparent 70%);
  pointer-events:none;
}
.sidebar-logo .logo-mark {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.sidebar-logo .logo-icon {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,#B8924A,#D4AD72);
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
  box-shadow:0 2px 8px rgba(184,146,74,.35);
}
.sidebar-logo h1 { font-family:var(--serif); font-size:18px; color:#F0EDE7; letter-spacing:-.2px; font-weight:600; }
.sidebar-logo .owner-block { padding:10px 12px; background:rgba(255,255,255,.04); border-radius:10px; border:1px solid rgba(255,255,255,.07); }
.sidebar-logo .owner-label { font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-mid); margin-bottom:2px; }
.sidebar-logo .owner-name  { font-size:13px; font-weight:600; color:#F0EDE7; }
.sidebar-logo .owner-role  { font-size:11px; color:var(--sidebar-text2); margin-top:1px; }

.sidebar-nav { padding:14px 10px; flex:1; overflow-y:auto; }
.sidebar-nav::-webkit-scrollbar { width:0; }
.nav-section-title { font-size:9px; font-weight:700; color:var(--sidebar-text2); letter-spacing:.1em; text-transform:uppercase; padding:12px 10px 5px; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:9px; cursor:pointer;
  color:var(--sidebar-text2); font-size:13px; font-weight:400;
  transition:all var(--transition); margin-bottom:1px;
  position:relative;
}
.nav-item:hover { background:rgba(255,255,255,.06); color:var(--sidebar-text); }
.nav-item.active {
  background:rgba(184,146,74,.15);
  color:var(--gold-mid);
  font-weight:500;
}
.nav-item.active::before {
  content:'';
  position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 2px 2px 0;
  background:var(--gold);
}
.nav-item svg { width:15px; height:15px; flex-shrink:0; opacity:.7; }
.nav-item.active svg, .nav-item:hover svg { opacity:1; }

.sidebar-footer { padding:14px 12px 16px; border-top:1px solid var(--sidebar-border); }
.user-pill { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.avatar {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,#B8924A,#D4AD72);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#1C1915;
  flex-shrink:0;
}
.user-name { font-size:12px; font-weight:600; color:var(--sidebar-text); }
.user-role { font-size:10px; color:var(--sidebar-text2); margin-top:1px; }

/* ── PAGE HEADER ── */
.page-header {
  padding:24px 32px 20px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
}
.page-title { font-family:var(--serif); font-size:26px; color:var(--text); letter-spacing:-.4px; font-weight:600; }
.page-subtitle { font-size:13px; color:var(--text3); margin-top:3px; }
.page-content { padding:24px 32px; flex:1; }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:8px 16px; border-radius:9px;
  font-family:var(--sans); font-size:13px; font-weight:500;
  cursor:pointer; border:none; transition:all var(--transition);
  letter-spacing:-.01em;
}
.btn-primary { background:linear-gradient(135deg,#B8924A,#D4AD72); color:#1C1915; box-shadow:0 2px 8px rgba(184,146,74,.3); }
.btn-primary:hover { background:linear-gradient(135deg,#A07C3A,#C49C62); box-shadow:0 4px 14px rgba(184,146,74,.4); transform:translateY(-1px); }
.btn-primary:active { transform:translateY(0); }
.btn-secondary { background:var(--surface); color:var(--text2); border:1px solid var(--border2); box-shadow:var(--shadow-xs); }
.btn-secondary:hover { background:var(--surface2); color:var(--text); border-color:var(--border2); box-shadow:var(--shadow); }
.btn-ghost { background:transparent; color:var(--text3); border:1px solid transparent; }
.btn-ghost:hover { background:var(--surface2); color:var(--text); border-color:var(--border); }
.btn-danger { background:var(--red-light); color:var(--red); border:1px solid transparent; }
.btn-danger:hover { background:var(--red); color:white; }
.btn-green { background:linear-gradient(135deg,#2E6E4A,#3A8A5C); color:white; box-shadow:0 2px 8px rgba(46,110,74,.25); }
.btn-green:hover { background:linear-gradient(135deg,#245A3C,#2E6E4A); box-shadow:0 4px 12px rgba(46,110,74,.35); transform:translateY(-1px); }
.btn svg { width:14px; height:14px; }

/* ── CARDS ── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
  box-shadow:var(--shadow);
  transition:box-shadow var(--transition);
}
.card:hover { box-shadow:var(--shadow-lg); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-title { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px 20px;
  box-shadow:var(--shadow); transition:all var(--transition);
  position:relative; overflow:hidden;
}
.stat-card::after {
  content:''; position:absolute; top:0; right:0;
  width:60px; height:60px;
  background:radial-gradient(circle at top right, rgba(184,146,74,.06) 0%, transparent 70%);
  pointer-events:none;
}
.stat-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-1px); }
.stat-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-family:var(--serif); font-size:28px; color:var(--text); letter-spacing:-.5px; }
.stat-sub { font-size:12px; color:var(--text3); margin-top:5px; }
.stat-up { color:var(--green); } .stat-down { color:var(--red); }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.02em; }
.badge-green   { background:var(--green-light);  color:var(--green); }
.badge-red     { background:var(--red-light);    color:var(--red); }
.badge-amber   { background:var(--gold-light);   color:var(--gold-dark); }
.badge-blue    { background:var(--blue-light);   color:var(--blue); }
.badge-gray    { background:var(--surface3);     color:var(--text3); }
.badge-purple  { background:var(--purple-light); color:var(--purple); }

/* ── TABLE ── */
.table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; }
th {
  background:var(--surface2); color:var(--text3);
  font-weight:700; font-size:10px; letter-spacing:.06em; text-transform:uppercase;
  padding:10px 14px; text-align:left; border-bottom:1px solid var(--border);
}
td { padding:12px 14px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(184,146,74,.03); }

/* ── FORMS ── */
.form-grid   { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.form-field { display:flex; flex-direction:column; gap:5px; }
.form-field.full { grid-column:1/-1; }
label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:.04em; text-transform:uppercase; }
input, select, textarea {
  font-family:var(--sans); font-size:13px; color:var(--text);
  background:var(--surface); border:1px solid var(--border2);
  border-radius:9px; padding:9px 13px; outline:none;
  transition:all var(--transition); width:100%;
}
input:focus, select:focus, textarea:focus {
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(184,146,74,.13);
  background:#FFFDF8;
}
textarea { resize:vertical; min-height:80px; }
.form-section-title {
  font-family:var(--serif); font-size:17px; color:var(--text);
  margin-bottom:14px; padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(28,25,21,.55);
  backdrop-filter:blur(4px);
  z-index:100; display:flex; align-items:flex-start; justify-content:center;
  padding:40px 20px; overflow-y:auto; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border-radius:var(--radius-xl);
  border:1px solid var(--border); box-shadow:var(--shadow-xl);
  width:100%; max-width:680px; overflow:hidden;
  transform:translateY(16px) scale(.98);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
}
.modal.wide { max-width:820px; }
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-header {
  padding:22px 26px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom, var(--surface), var(--surface2));
}
.modal-title { font-family:var(--serif); font-size:21px; color:var(--text); font-weight:600; }
.modal-body { padding:22px 26px; max-height:75vh; overflow-y:auto; }
.modal-footer {
  padding:16px 26px; border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:flex-end; gap:10px;
  background:var(--surface2);
}

/* ── SEARCH BAR ── */
.search-bar {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:9px; padding:7px 12px;
  transition:all var(--transition); box-shadow:var(--shadow-xs);
}
.search-bar:focus-within { border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,146,74,.1); }
.search-bar input { border:none; background:none; padding:0; font-size:13px; color:var(--text); outline:none; width:220px; }
.search-bar svg { width:15px; height:15px; color:var(--text3); flex-shrink:0; }

/* ── PROPERTY CARDS ── */
.property-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.property-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
  box-shadow:var(--shadow); transition:all var(--transition); cursor:pointer;
}
.property-card:hover { box-shadow:var(--shadow-xl); border-color:var(--gold-mid); transform:translateY(-2px); }
.property-img { height:145px; background:var(--surface2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background-size:cover; background-position:center; }
.property-img::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,transparent 50%,rgba(28,25,21,.25)); }
.property-img-inner { font-size:52px; opacity:.2; }
.property-status { position:absolute; top:10px; right:10px; z-index:1; }
.property-body { padding:14px 16px; }
.property-address { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
.property-type { font-size:12px; color:var(--text3); margin-bottom:10px; }
.property-meta { display:flex; align-items:center; justify-content:space-between; }
.property-price { font-family:var(--serif); font-size:19px; color:var(--gold-dark); font-weight:600; }
.property-price span { font-family:var(--sans); font-size:12px; color:var(--text3); font-weight:400; }

/* ── PROGRESS BARS ── */
.progress-bar { height:7px; background:var(--surface3); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width .6s cubic-bezier(.4,0,.2,1); }
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:5px; }

/* ── TABS ── */
.tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab { padding:9px 16px; font-size:13px; font-weight:400; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all var(--transition); }
.tab:hover { color:var(--text2); }
.tab.active { color:var(--gold-dark); font-weight:600; border-bottom-color:var(--gold); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:200;
  background:var(--text); color:#F0EDE7;
  padding:12px 18px; border-radius:12px; font-size:13px; font-weight:500;
  box-shadow:var(--shadow-xl); transform:translateY(60px); opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; display:flex; align-items:center; gap:8px;
  border:1px solid rgba(255,255,255,.08);
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { background:var(--green); color:white; }
.toast.error   { background:var(--red);   color:white; }

/* ── MISC ── */
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.dot-green { background:var(--green); } .dot-amber { background:var(--gold); }
.dot-red   { background:var(--red); }   .dot-gray  { background:var(--text3); }

.highlight-box { background:var(--gold-light); border:1px solid var(--gold-mid); border-radius:var(--radius); padding:14px 16px; margin-bottom:18px; }
.highlight-box p { font-size:13px; color:var(--gold-dark); }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.fade-in { animation:fadeIn .3s ease both; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--gold-mid); }

/* ── FEATURE CHIPS ── */
.feat-section { margin-bottom:18px; }
.feat-section-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.feat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:6px; }
.feat-chip { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--border); border-radius:9px; cursor:pointer; transition:all var(--transition); user-select:none; background:var(--surface); }
.feat-chip:hover { border-color:var(--gold-mid); background:var(--gold-light); }
.feat-chip.on { border-color:var(--gold); background:var(--gold-light); }
.feat-chip.on .feat-chip-label { color:var(--gold-dark); font-weight:500; }
.feat-chip-icon { font-size:15px; flex-shrink:0; }
.feat-chip-label { font-size:12px; color:var(--text2); line-height:1.3; }
.feat-chip-check { margin-left:auto; width:14px; height:14px; border-radius:50%; border:1.5px solid var(--border2); flex-shrink:0; transition:all var(--transition); display:flex; align-items:center; justify-content:center; }
.feat-chip.on .feat-chip-check { background:var(--gold); border-color:var(--gold); }
.feat-chip.on .feat-chip-check::after { content:''; width:5px; height:5px; border-radius:50%; background:white; display:block; }

/* ── STEP INDICATOR ── */
.step-indicator { display:flex; gap:0; margin-bottom:28px; }
.step { display:flex; align-items:center; gap:10px; flex:1; }
.step:last-child { flex:0; }
.step-circle { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; transition:all var(--transition); }
.step-circle.done   { background:var(--green); color:white; }
.step-circle.active { background:linear-gradient(135deg,var(--gold),var(--gold-mid)); color:#1C1915; box-shadow:0 2px 8px rgba(184,146,74,.4); }
.step-circle.pending { background:var(--surface2); color:var(--text3); border:1px solid var(--border2); }
.step-label { font-size:12px; font-weight:500; color:var(--text3); white-space:nowrap; }
.step-label.active { color:var(--gold-dark); font-weight:600; }
.step-label.done   { color:var(--green); }
.step-line { flex:1; height:1px; background:var(--border2); margin:0 8px; }
.step-line.done { background:var(--green); }

/* ── PHOTOS ── */
.photo-zone { display:flex; gap:8px; flex-wrap:wrap; min-height:90px; background:var(--surface2); border-radius:var(--radius); padding:8px; align-items:flex-start; border:1px dashed var(--border2); }
.photo-zone.empty { align-items:center; justify-content:center; min-height:90px; }
.photo-thumb-wrap { position:relative; width:100px; height:80px; border-radius:9px; overflow:hidden; flex-shrink:0; cursor:zoom-in; box-shadow:var(--shadow-xs); }
.photo-thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform var(--transition); }
.photo-thumb-wrap:hover img { transform:scale(1.06); }
.photo-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.6); color:white; border:none; border-radius:50%; width:18px; height:18px; font-size:10px; cursor:pointer; opacity:0; transition:opacity var(--transition); display:flex; align-items:center; justify-content:center; line-height:1; }
.photo-thumb-wrap:hover .photo-del { opacity:1; }

/* ── CONTRACT EDITOR ── */
.ct-field:focus {
  background: rgba(184,146,74,.15) !important;
  border-bottom-color: var(--gold-dark) !important;
  outline: none;
}
.ct-field:hover {
  background: rgba(184,146,74,.1) !important;
}
#contract-preview p { line-height: 1.9; }

/* ── LIGHTBOX ── */
#lightbox { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.94); display:none; align-items:center; justify-content:center; }
#lightbox img { max-width:90vw; max-height:85vh; border-radius:10px; object-fit:contain; box-shadow:0 8px 40px rgba(0,0,0,.5); }

.lb-btn:hover { background:rgba(255,255,255,.25); }

/* ── FILTER BAR ── */
.filter-bar {
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;

  border-bottom:1px solid var(--border);
}

}
.filter-bar select:focus, .filter-bar input[type=date]:focus {
  border-color:var(--gold); box-shadow:0 0 0 2px rgba(184,146,74,.12);
}

/* ── DIVIDER ── */
hr, .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
</style>

var STORAGE_KEY = 'propmanager_v1';

function saveDB() {
  try {
    // Save only mutable data (not static template config)
    var data = {
      inmuebles: DB.inmuebles.map(function(p) {
        var p2 = Object.assign({}, p);
        return p2;
      }),
      locadores: DB.locadores || [],
      nextId: DB.nextId,
      inquilinos: DB.inquilinos,
      contratos: DB.contratos,
      cobros: DB.cobros,
      gastos: DB.gastos,
      incidencias: DB.incidencias
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    if(e.name === 'QuotaExceededError') {
      // Photos too large — save without photos
      try {
        var data2 = {
          inmuebles: DB.inmuebles.map(function(p){ return Object.assign({}, p, {fotos:[]}); }),
          locadores: DB.locadores || [],
          nextId: DB.nextId,
          inquilinos: DB.inquilinos,
          contratos: DB.contratos,
          cobros: DB.cobros,
          gastos: DB.gastos,
          incidencias: DB.incidencias
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data2));
        toast('Guardado sin fotos (espacio insuficiente)', '');
      } catch(e2) { console.warn('localStorage save failed:', e2); }
    } else { console.warn('localStorage save failed:', e); }
  }
}

function loadDB() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    var data = JSON.parse(raw);
    if(data.inmuebles) DB.inmuebles = data.inmuebles;
    if(data.nextId) DB.nextId = data.nextId;
    if(data.locadores && data.locadores.length) DB.locadores = data.locadores;
    if(data.inquilinos) DB.inquilinos = data.inquilinos;
    if(data.contratos) DB.contratos = data.contratos;
    if(data.cobros) DB.cobros = data.cobros;
    if(data.gastos) DB.gastos = data.gastos;
    if(data.incidencias) DB.incidencias = data.incidencias;
    return true;
  } catch(e) { console.warn('localStorage load failed:', e); return false; }
}

function exportUserData() {
  var data = {
    version: 2,
    fecha: new Date().toISOString(),
    locadores:   DB.locadores   || [],
    inquilinos:  DB.inquilinos  || [],
    contratos:   DB.contratos   || [],
    cobros:      DB.cobros      || [],
    gastos:      DB.gastos      || [],
    incidencias: DB.incidencias || [],
    inmuebles:   DB.inmuebles.map(function(p){ return Object.assign({},p,{fotos:[]}); })
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'PropManager_backup_' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Backup descargado ✓', 'success');
}

function importUserData(input) {
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if(!data.inquilinos && !data.contratos) {
        toast('Archivo no válido — no es un backup de PropManager', 'error'); return;
      }
      if(!confirm('¿Importar los datos de este backup? Los datos actuales serán reemplazados.')) return;
      if(data.locadores   && data.locadores.length)   DB.locadores   = data.locadores;
      if(data.inquilinos)  DB.inquilinos  = data.inquilinos;
      if(data.contratos)   DB.contratos   = data.contratos;
      if(data.cobros)      DB.cobros      = data.cobros;
      if(data.gastos)      DB.gastos      = data.gastos;
      if(data.incidencias) DB.incidencias = data.incidencias;
      if(data.inmuebles && data.inmuebles.length) {
        // Merge: preserve existing fotos, update rest
        data.inmuebles.forEach(function(imp){
          var existing = DB.inmuebles.find(function(p){ return p.id===imp.id; });
          if(existing) {
            Object.assign(existing, imp);
          } else {
            DB.inmuebles.push(imp);
          }
        });
      }
      saveDB();
      closeModal();
      nav('dashboard');
      toast('Datos importados correctamente ✓', 'success');
    } catch(err) {
      toast('Error al importar: ' + (err.message||''), 'error');
    }
  };
  reader.readAsText(file);
}

function openModal(title, bodyEl, wide, footerEl) {
  closeModal();
  var ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.id = 'modal-ov';
  var m = document.createElement('div');
  m.className = 'modal' + (wide ? ' wide' : '');
  // header
  var hdr = document.createElement('div'); hdr.className = 'modal-header';
  var ttl = document.createElement('div'); ttl.className = 'modal-title'; ttl.textContent = title;
  var cls = document.createElement('button'); cls.className = 'btn btn-ghost'; cls.style.padding = '4px 8px';
  cls.textContent = '✕'; cls.onclick = closeModal;
  hdr.appendChild(ttl); hdr.appendChild(cls);
  // body
  var bdy = document.createElement('div'); bdy.className = 'modal-body';
  if(typeof bodyEl === 'string') { bdy.innerHTML = bodyEl; } else { bdy.appendChild(bodyEl); }
  m.appendChild(hdr); m.appendChild(bdy);
  if(footerEl) { var ftr = document.createElement('div'); ftr.className = 'modal-footer'; ftr.appendChild(footerEl); m.appendChild(ftr); }
  ov.appendChild(m);
  ov.addEventListener('click', function(e){ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  requestAnimationFrame(function(){ ov.classList.add('open'); });
}

function closeModal() {
  var ov = document.getElementById('modal-ov');
  if(!ov) return;
  ov.classList.remove('open');
  setTimeout(function(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }, 200);
}

function modalFooter(btns) {
  var ftr = document.createDocumentFragment();
  var cancel = document.createElement('button');
  cancel.className = 'btn btn-secondary'; cancel.textContent = 'Cancelar'; cancel.onclick = closeModal;
  ftr.appendChild(cancel);
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'btn ' + b.cls; btn.textContent = b.label; btn.onclick = b.action;
    ftr.appendChild(btn);
  });
  var wrap = document.createElement('div');
  wrap.style.display='contents';
  wrap.appendChild(ftr);
  // Actually return a real element
  var w2 = document.createElement('div'); w2.style.cssText='display:flex;align-items:center;gap:10px';
  w2.appendChild(cancel);
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'btn ' + b.cls; btn.textContent = b.label; btn.onclick = b.action;
    w2.appendChild(btn);
  });
  return w2;
}

      grid.appendChild(chip);
    });

  return wrap;
}

function getSelectedFeats(container) {

var LB_INM = null; var LB_IDX = 0;

function buildPhotoSection(inmId) {
  var inm = getInm(inmId);
  var wrap = document.createElement('div');
  wrap.style.marginBottom = '18px';
  var topRow = document.createElement('div');
  topRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px';
  var lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em';
  lbl.textContent = 'Fotos del inmueble';
  var uploadLabel = document.createElement('label');
  uploadLabel.className = 'btn btn-secondary';
  uploadLabel.style.cssText = 'cursor:pointer;font-size:12px;padding:5px 12px';
  uploadLabel.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Subir fotos';
  var fileInput = document.createElement('input');
  fileInput.type='file'; fileInput.accept='image/*'; fileInput.multiple=true; fileInput.style.display='none';
  fileInput.addEventListener('change', function(){ handlePhotoUpload(inmId, fileInput, zone); });
  uploadLabel.appendChild(fileInput);
  topRow.appendChild(lbl); topRow.appendChild(uploadLabel);
  var zone = document.createElement('div');
  zone.id = 'photo-zone-' + inmId;
  renderPhotoZone(zone, inm);
  wrap.appendChild(topRow); wrap.appendChild(zone);
  return wrap;
}

function renderPhotoZone(zone, inm) {
  zone.innerHTML = '';
  if(!inm.fotos || inm.fotos.length === 0) {
    zone.className = 'photo-zone empty';
    zone.innerHTML = '<div style="text-align:center"><div style="font-size:28px;opacity:.3;margin-bottom:4px">📷</div><div style="font-size:12px;color:var(--text3)">Sin fotos · subí imágenes con el botón</div></div>';
    return;
  }
  zone.className = 'photo-zone';
  inm.fotos.forEach(function(src, idx) {
    var wrap = document.createElement('div'); wrap.className = 'photo-thumb-wrap';
    var img = document.createElement('img'); img.src = src; img.alt = 'foto ' + (idx+1);
    img.addEventListener('click', function(){ openLB(inm.id, idx); });
    var del = document.createElement('button'); del.className = 'photo-del'; del.innerHTML = '&#10005;';
    del.addEventListener('click', function(e){ e.stopPropagation(); deletePhoto(inm.id, idx, zone); });
    wrap.appendChild(img); wrap.appendChild(del); zone.appendChild(wrap);
  });
}

function handlePhotoUpload(inmId, input, zone) {
  var inm = getInm(inmId); if(!inm) return;
  var files = Array.from(input.files); var loaded = 0;
  files.forEach(function(file) {
    var r = new FileReader();
    r.onload = function(e) {
      inm.fotos.push(e.target.result); loaded++;
      if(loaded === files.length) {
        renderPhotoZone(zone, inm);
        refreshGrid();
        saveDB(); toast(files.length + ' foto' + (files.length>1?'s':'') + ' agregada' + (files.length>1?'s':''), 'success');
      }
    };
    r.readAsDataURL(file);
  });
}

function deletePhoto(inmId, idx, zone) {
  var inm = getInm(inmId); if(!inm) return;
  inm.fotos.splice(idx, 1);
  renderPhotoZone(zone, inm);
  refreshGrid(); saveDB();
}

function openLB(inmId, idx) {
  var inm = getInm(inmId); if(!inm||!inm.fotos.length) return;
  LB_INM = inmId; LB_IDX = idx;
  document.getElementById('lb-img').src = inm.fotos[idx];
  document.getElementById('lb-counter').textContent = (idx+1) + ' / ' + inm.fotos.length;
  document.getElementById('lb-prev').style.display = inm.fotos.length > 1 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = inm.fotos.length > 1 ? 'flex' : 'none';
  document.getElementById('lightbox').style.display = 'flex';
}

function lbNav(dir) {
  var inm = getInm(LB_INM); if(!inm) return;
  LB_IDX = (LB_IDX + dir + inm.fotos.length) % inm.fotos.length;
  document.getElementById('lb-img').src = inm.fotos[LB_IDX];
  document.getElementById('lb-counter').textContent = (LB_IDX+1) + ' / ' + inm.fotos.length;
}

function closeLB() { document.getElementById('lightbox').style.display = 'none'; }

var FILTER = {
  inmuebleId: 'todos',
  periodo: 'todo',      // 'todo' | 'este_mes' | 'este_anio' | 'personalizado'
  desde: '',
  hasta: '',
};

function filterLabel() {
  if(FILTER.periodo==='este_mes')  return 'Este mes';
  if(FILTER.periodo==='este_anio') return 'Este año';
  if(FILTER.periodo==='personalizado') return (FILTER.desde||'?') + ' → ' + (FILTER.hasta||'?');
  return 'Todo el período';
}

function cobrosFiltered() {
  return DB.cobros.filter(function(c) {
    // Include cobros with no contract (registered via comprobante upload)
    var ct = getCt(c.ctId);
    if(!ct && !c.ctId) {
      // For direct cobros: only filter by date, not by inmueble (no contract to link)
      if(FILTER.periodo === 'este_mes') {
        var hoy0=new Date(); var mes0=String(hoy0.getMonth()+1).padStart(2,'0'); var anio0=hoy0.getFullYear();
        return (c.vence||'').startsWith(anio0+'-'+mes0) || (c.fechaPago||'').startsWith(anio0+'-'+mes0);
      }
      if(FILTER.periodo === 'este_anio') return (c.vence||c.fechaPago||'').startsWith(String(new Date().getFullYear()));
      if(FILTER.periodo === 'personalizado' && FILTER.desde && FILTER.hasta) {
        var d = c.vence||c.fechaPago||'';
        return d >= FILTER.desde && d <= FILTER.hasta;
      }
      return FILTER.inmuebleId === 'todos'; // only show in "all" filter
    }
    if(!ct) return false;
    if(FILTER.inmuebleId !== 'todos' && ct.inmId !== parseInt(FILTER.inmuebleId)) return false;
    if(FILTER.periodo === 'este_mes') {
      var hoy = new Date(); var mes = String(hoy.getMonth()+1).padStart(2,'0'); var anio = hoy.getFullYear();
      var tag = anio + '-' + mes;
      return (c.vence||'').startsWith(tag) || (c.mes||'').includes(String(anio));
    }
    if(FILTER.periodo === 'este_anio') {
      var anio2 = new Date().getFullYear();
      return (c.vence||'').startsWith(String(anio2)) || (c.mes||'').includes(String(anio2));
    }
    if(FILTER.periodo === 'personalizado' && FILTER.desde && FILTER.hasta) {
      return (c.vence||'') >= FILTER.desde && (c.vence||'') <= FILTER.hasta;
    }
    return true;
  });
}

function gastosFiltered() {
  return DB.gastos.filter(function(g) {
    if(FILTER.inmuebleId !== 'todos' && g.inmId !== parseInt(FILTER.inmuebleId)) return false;
    if(FILTER.periodo === 'este_mes') {
      var hoy = new Date(); var mes = String(hoy.getMonth()+1).padStart(2,'0'); var anio = hoy.getFullYear();
      return (g.fecha||'').startsWith(anio + '-' + mes);
    }
    if(FILTER.periodo === 'este_anio') {
      return (g.fecha||'').startsWith(String(new Date().getFullYear()));
    }
    if(FILTER.periodo === 'personalizado' && FILTER.desde && FILTER.hasta) {
      return (g.fecha||'') >= FILTER.desde && (g.fecha||'') <= FILTER.hasta;
    }
    return true;
  });
}

// sparkline SVG (mini bar chart)
function sparkBars(values, color, h2) {
  if(!values.length) return '';
  var max = Math.max.apply(null, values) || 1;
  var w = 28; var gap = 4; var totalW = values.length*(w+gap)-gap;
  var bars = values.map(function(v,i){
    var bh = Math.max(4, Math.round(v/max*(h2-4)));
    return '<rect x="'+(i*(w+gap))+'" y="'+(h2-bh)+'" width="'+w+'" height="'+bh+'" fill="'+color+'" rx="3" opacity="0.75"/>';
  }).join('');
  return '<svg viewBox="0 0 '+totalW+' '+h2+'" width="'+(totalW/2)+'" height="'+(h2/2)+'" style="display:block">'+bars+'</svg>';
}

var FILTRO_ESTADO = 'todos';

function propertyCardHTML(p) {
  var statusMap = {alquilado:'badge-green',disponible:'badge-amber',mantenimiento:'badge-gray'};
  var emojiMap = {'Departamento':'🏢','Local comercial':'🏪','Oficina':'🏛️','Casa':'🏡','PH':'🏠','Loft':'🏙️'};
  var cover = p.fotos && p.fotos.length > 0 ? p.fotos[0] : '';
  var bgStyle = cover ? 'background-image:url(' + cover + ');background-size:cover;background-position:center' : '';
  var countBadge = (p.fotos && p.fotos.length > 1) ? '<div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.5);color:white;font-size:11px;padding:2px 7px;border-radius:20px">📷 ' + p.fotos.length + '</div>' : '';
  return '<div class="property-card" onclick="showInmDetail(' + p.id + ')">' +
    '<div class="property-img" style="' + bgStyle + '">' +
    (!cover ? '<div class="property-img-inner">' + (emojiMap[p.tipo]||'🏠') + '</div>' : '') +
    '<div class="property-status">' + statusBadge(p.estado) + '</div>' + countBadge +
    '</div>' +
    '<div class="property-body">' +
    '<div class="property-address">' + h(p.dir.split(',')[0]) + '</div>' +
    '<div class="property-type">' + h(p.barrio) + ' · ' + h(p.tipo) + ' · ' + p.m2 + 'm²</div>' +
    '<div class="property-meta"><div class="property-price">' + fmtPeso(p.precio) + '<span>/mes</span></div>' +
    (p.hab > 0 ? '<span style="font-size:12px;color:var(--text3)">' + p.hab + ' amb.</span>' : '') +

}

function pgInmuebles(el) {

function renderFiltros() {
  var container = document.getElementById('filtros-estado'); if(!container) return;
  container.innerHTML = '';
  ['todos','disponible','alquilado','mantenimiento'].forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'btn btn-ghost'; btn.textContent = s.charAt(0).toUpperCase()+s.slice(1);
    if(s === FILTRO_ESTADO) { btn.style.background='var(--surface2)'; btn.style.color='var(--text)'; btn.style.borderColor='var(--border2)'; }
    btn.onclick = function() { FILTRO_ESTADO = s; renderFiltros(); refreshGrid(); };
    container.appendChild(btn);
  });
}

function refreshGrid(query) {
  var grid = document.getElementById('inm-grid'); if(!grid) return;
  var list = DB.inmuebles;
  if(FILTRO_ESTADO !== 'todos') list = list.filter(function(p){ return p.estado === FILTRO_ESTADO; });
  if(query) { var q = query.toLowerCase(); list = list.filter(function(p){ return p.dir.toLowerCase().indexOf(q)>-1 || p.barrio.toLowerCase().indexOf(q)>-1; }); }
  grid.innerHTML = list.map(propertyCardHTML).join('');
}

function filterInm(q) { refreshGrid(q); }

function showInmDetail(id) {

  var body = document.createElement('div');

  // Header

    ctBox.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Contrato vigente</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:13px"><span>Inquilino: <strong>' + h(inq?inq.nombre:'—') + '</strong></span><span>Hasta: <strong>' + h(ct.fin) + '</strong></span></div>';
    body.appendChild(ctBox);

  var actRow = document.createElement('div'); actRow.style.cssText = 'display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border)';

    btnCt.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Generar contrato';
    btnCt.onclick = function(){ closeModal(); nav('contratos'); };
    actRow.appendChild(btnCt);
  }
  var btnEdit = document.createElement('button'); btnEdit.className = 'btn btn-secondary';
  btnEdit.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar';

function openAddInm() {
  var formWrap = buildInmForm(null);
  var footer = modalFooter([{label:'Guardar inmueble',cls:'btn-green',action:function(){
    var data = readInmForm(formWrap);
    if(!data.dir){ toast('Ingresá la dirección','error'); return; }
    data.id = DB.nextId++; data.fotos = [];
    DB.inmuebles.push(data);
    closeModal(); refreshGrid(); saveDB();
    toast('Inmueble agregado · ' + data.feats.length + ' características','success');
  }}]);
  openModal('Nuevo inmueble', formWrap, true, footer);
}

function openEditInm(id) {
  var p = getInm(id); if(!p) return;
  var formWrap = buildInmForm(p);
  var footer = modalFooter([{label:'Guardar cambios',cls:'btn-green',action:function(){
    var data = readInmForm(formWrap);
    if(!data.dir){ toast('Ingresá la dirección','error'); return; }
    Object.assign(p, data);
    closeModal(); refreshGrid(); saveDB();
    toast('Inmueble actualizado','success');
  }}]);
  openModal('Editar inmueble', formWrap, true, footer);
}

function confirmDelInm(id) {
  var p = getInm(id); if(!p) return;
  var ct = ctByInm(id);
  var body = document.createElement('div'); body.style.cssText = 'text-align:center;padding:10px 0';
  body.innerHTML = '<div style="font-size:40px;margin-bottom:14px">⚠️</div>' +
    '<div style="font-family:var(--serif);font-size:18px;margin-bottom:8px">¿Eliminar ' + h(p.dir.split(',')[0]) + '?</div>' +
    (ct ? '<div style="background:var(--red-light);border:1px solid var(--red);border-radius:var(--radius);padding:10px 14px;margin:12px 0;font-size:13px;color:var(--red)">⚠️ Este inmueble tiene un <strong>contrato vigente</strong>.</div>' : '') +
    '<p style="font-size:13px;color:var(--text3)">Esta acción no se puede deshacer.</p>';
  var footer = modalFooter([{label:'Sí, eliminar',cls:'btn-danger',action:function(){
    var idx = DB.inmuebles.findIndex(function(x){ return x.id===id; });
    if(idx>-1) DB.inmuebles.splice(idx,1);
    saveDB(); closeModal(); if(PAGE==='inmuebles') nav('inmuebles'); else renderPage();
    toast('Inmueble eliminado','');
  }}]);
  openModal('Eliminar inmueble', body, false, footer);
}

    btnNote.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

    btnDel.className = 'btn btn-danger';
    btnDel.style.cssText = 'font-size:11px;padding:4px 8px';
    btnDel.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';

function handleContratoUpload(inqId, input, container) {
  var inq = getInq(inqId); if(!inq) return;
  if(!inq.contrato_generado) inq.contrato_generado = [];
  var files = Array.from(input.files);
  if(!files.length) return;

  var loaded = 0;
  var fileDataList = [];

  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      fileDataList.push({
        name: file.name,
        type: file.type,
        size: file.size,
        data: e.target.result,
        fecha: new Date().toLocaleDateString('es-AR'),
        firmado: false
      });
      loaded++;
      if(loaded === files.length) {
        showContratoUploadModal(inq, fileDataList, container);
      }
    };
    reader.onerror = function() { toast('Error al leer ' + file.name, 'error'); };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function showContratoUploadModal(inq, fileDataList, container) {
  var bodyEl = document.createElement('div');
  bodyEl.innerHTML =
    '<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Vas a guardar <strong>' + fileDataList.length + ' contrato' + (fileDataList.length>1?'s':'') + '</strong> en la ficha de <strong>' + h(inq.nombre) + '</strong>:</p>' +
    '<div style="background:var(--surface2);border-radius:var(--radius);padding:10px 14px;margin-bottom:18px">' +
    fileDataList.map(function(f){
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px">' +
        '<span>' + (f.type.includes('pdf')?'📄':f.type.includes('word')?'📝':'📎') + '</span>' +
        '<span>' + h(f.name) + '</span>' +
        '<span style="color:var(--text3);font-size:11px">(' + Math.round((f.size||0)/1024) + ' KB)</span>' +
        '</div>';
    }).join('') + '</div>' +
    '<div class="form-grid">' +
    '<div class="form-field"><label>N° de contrato (opcional)</label>' +
    '<input id="cu-num" type="text" value="' + (inq.contrato||'') + '" placeholder="C-2025-001"></div>' +
    '<div class="form-field"><label>Estado</label>' +
    '<select id="cu-firmado"><option value="0">Pendiente de firma</option><option value="1">Ya firmado</option></select>' +
    '</div></div>';

  var footer = modalFooter([{
    label: 'Guardar contrato',
    cls: 'btn-green',
    action: function() {
      var num = document.getElementById('cu-num').value.trim();
      var firmado = document.getElementById('cu-firmado').value === '1';
      fileDataList.forEach(function(f) {
        f.version = num || null;
        f.firmado = firmado;
        f.fechaFirma = firmado ? new Date().toLocaleDateString('es-AR') : null;

      });

  openModal('Guardar contrato en ficha', bodyEl, false, footer);

function handleCompUpload(inqId, input, container) {
  var inq = getInq(inqId); if(!inq) return;
  if(!inq.comprobantes) inq.comprobantes = [];
  var files = Array.from(input.files);
  if(!files.length) return;

  // Read ALL files first, THEN show modal to ask for period
  var loaded = 0;
  var fileDataList = [];

  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      fileDataList.push({
        name: file.name,
        type: file.type,
        size: file.size,
        data: e.target.result,
        fecha: new Date().toLocaleDateString('es-AR')
      });
      loaded++;
      if(loaded === files.length) {
        // All files read — now show period modal
        showPeriodoModal(inq, fileDataList, container);
      }
    };
    reader.onerror = function() {
      toast('Error al leer ' + file.name, 'error');
    };
    reader.readAsDataURL(file);
  });
  // Reset input so same file can be re-selected
  input.value = '';
}

function showPeriodoModal(inq, fileDataList, container) {
  var hoy = new Date();
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var defaultPeriodo = meses[hoy.getMonth()] + ' ' + hoy.getFullYear();

  // Cobros pendientes del inquilino (via contratos)
  var cobrosPendientes = [];
  DB.contratos.filter(function(ct){ return ct.inqId === inq.id; }).forEach(function(ct){
    DB.cobros.filter(function(c){ return c.ctId===ct.id && c.estado!=='cobrado'; }).forEach(function(c){
      cobrosPendientes.push({cobro:c, ct:ct});
    });
  });

  // También buscar contratos por inmueble si inq.inmId está asignado
  if(!cobrosPendientes.length && inq.inmId) {
    DB.contratos.filter(function(ct){ return ct.inmId===inq.inmId && ct.inqId===null; }).forEach(function(ct){
      DB.cobros.filter(function(c){ return c.ctId===ct.id && c.estado!=='cobrado'; }).forEach(function(c){
        cobrosPendientes.push({cobro:c, ct:ct});
      });
    });
  }

  var hasPendientes = cobrosPendientes.length > 0;
  var periodoOpts = hasPendientes
    ? '<option value="">── Período libre (sin cobro asociado) ──</option>' +
      cobrosPendientes.map(function(item){
        return '<option value="cobro:'+item.cobro.id+'">' +
          h(item.cobro.mes) + ' — ' + fmtPeso(item.cobro.monto) +
          ' (' + h(item.cobro.estado) + ')</option>';
      }).join('')
    : '';

  var bodyEl = document.createElement('div');
  bodyEl.innerHTML =
    '<p style="font-size:13px;color:var(--text2);margin-bottom:14px">' +
    'Guardando <strong>' + fileDataList.length + ' archivo' + (fileDataList.length>1?'s':'') + '</strong>:</p>' +
    '<div style="background:var(--surface2);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px">' +
    fileDataList.map(function(f){
      return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px">' +
        '<span>'+(f.type==='application/pdf'?'📄':'🖼️')+'</span>' +
        '<span>'+h(f.name)+'</span>' +
        '<span style="color:var(--text3);font-size:11px">('+Math.round(f.size/1024)+' KB)</span>' +
        '</div>';
    }).join('')+'</div>'+
    '<div class="form-grid">'+
    (hasPendientes ?
      '<div class="form-field full">'+
      '<label>Vincular a cobro pendiente</label>'+
      '<select id="cp-cobro-sel" onchange="onCpCobroChange()">'+periodoOpts+'</select>'+
      '<div style="font-size:11px;color:var(--green);margin-top:4px">✓ Se marcará como cobrado automáticamente</div>'+
      '</div>' : '') +
    '<div class="form-field'+(hasPendientes?' ':' full')+'">'+
    '<label>Período *</label>'+
    '<input id="cp-periodo" type="text" value="'+defaultPeriodo+'" placeholder="ej: Mayo 2025, Depósito...">'+
    '</div>'+
    '<div class="form-field">'+
    '<label>Monto pagado ($)</label>'+
    '<input id="cp-monto" type="number" placeholder="0">'+
    '</div>'+
    '<div class="form-field">'+
    '<label>Medio de pago</label>'+
    '<select id="cp-medio">'+
    '<option>Transferencia bancaria</option><option>Efectivo</option>'+
    '<option>Cheque</option><option>Otro</option>'+
    '</select>'+
    '</div>'+
    '<div class="form-field full">'+
    '<label>Referencia / Nota (opcional)</label>'+
    '<input id="cp-nota" type="text" placeholder="ej: Ref. transferencia #12345">'+
    '</div>'+
    '</div>';

  var footer = modalFooter([{
    label: 'Guardar y registrar pago',
    cls: 'btn-green',
    action: function() {
      var periodo  = document.getElementById('cp-periodo').value.trim() || defaultPeriodo;
      var monto    = parseInt(document.getElementById('cp-monto').value)||0;
      var medio    = document.getElementById('cp-medio').value;
      var nota     = document.getElementById('cp-nota').value.trim();
      var cobroSel = document.getElementById('cp-cobro-sel');
      var cobroVal = cobroSel ? cobroSel.value : '';
      var fechaHoy = new Date().toISOString().split('T')[0];

      // ── 1. Guardar archivo(s) como comprobante ─────────────
      var notaCompleta = [medio, nota, monto?'$'+monto.toLocaleString('es-AR'):''].filter(Boolean).join(' · ');
      fileDataList.forEach(function(f){
        f.periodo = periodo;
        f.nota    = notaCompleta;
        inq.comprobantes = inq.comprobantes || [];
        inq.comprobantes.push(f);
      });

      // ── 2. Gestionar el cobro ──────────────────────────────
      if(cobroVal && cobroVal.startsWith('cobro:')) {
        // Marcar cobro existente como cobrado
        var cId = parseInt(cobroVal.replace('cobro:',''));
        var cobro = DB.cobros.find(function(c){ return c.id===cId; });
        if(cobro) {
          cobro.estado     = 'cobrado';
          cobro.fechaPago  = fechaHoy;
          cobro.medioPago  = medio;
          cobro.referencia = nota;
          if(monto && monto !== cobro.monto) cobro.montoPagado = monto;
        }
      } else if(monto > 0) {
        // No hay cobro vinculado — crear uno nuevo registrando el pago
        // Buscar el contrato activo del inquilino
        var ct = DB.contratos.find(function(c){
          return c.inqId===inq.id && c.estado==='vigente';
        }) || DB.contratos.find(function(c){ return c.inqId===inq.id; });

        var newCobroId = DB.cobros.length
          ? Math.max.apply(null, DB.cobros.map(function(x){return x.id;})) + 1
          : 1;

        DB.cobros.push({
          id:          newCobroId,
          ctId:        ct ? ct.id : null,
          mes:         periodo,
          monto:       monto,
          estado:      'cobrado',
          fechaPago:   fechaHoy,
          fechaEmision:new Date().toLocaleDateString('es-AR'),
          medioPago:   medio,
          referencia:  nota,
          vence:       fechaHoy,
          obs:         'Registrado al subir comprobante'
        });

        // Si no tiene contrato, crear uno mínimo para asociar el cobro
        if(!ct) {
          var newCtId = DB.contratos.length
            ? Math.max.apply(null, DB.contratos.map(function(x){return x.id;})) + 1
            : 1;
          var newCtNum = 'C-'+new Date().getFullYear()+'-'+String(newCtId).padStart(3,'0');
          DB.contratos.push({
            id:     newCtId,
            num:    newCtNum,
            inmId:  inq.inmId || null,
            inqId:  inq.id,
            inicio: fechaHoy,
            fin:    '',
            monto:  monto,
            estado: 'vigente'
          });
          // Link the cobro to this new contract
          DB.cobros[DB.cobros.length-1].ctId = newCtId;
          if(!inq.contrato) inq.contrato = newCtNum;
        }
      }

      // ── 3. Guardar y refrescar ─────────────────────────────
      saveDB();
      renderCompList(container, inq);

      // Refresh historial de cobros dentro de la ficha
      var histEl = document.getElementById('historial-cobros-' + inq.id);
      if(histEl) renderHistorialCobros(histEl, inq.id);

      closeModal();

      // Refrescar página activa si es financiero/dashboard/informes
      var refreshPages = ['financiero','dashboard','informes','facturacion'];
      if(refreshPages.indexOf(PAGE) > -1) {
        setTimeout(function(){ nav(PAGE); }, 400);
      }

      var msg = fileDataList.length + ' comprobante' + (fileDataList.length>1?'s':'') + ' guardado' + (fileDataList.length>1?'s':'');
      if(monto) msg += ' · ' + fmtPeso(monto) + ' registrado';
      toast(msg, 'success');
    }
  }]);

  openModal('Registrar pago y comprobante', bodyEl, false, footer);
}

function onCpCobroChange() {
  var sel  = document.getElementById('cp-cobro-sel');
  var pEl  = document.getElementById('cp-periodo');
  var mEl  = document.getElementById('cp-monto');
  if(!sel || !pEl) return;
  var val = sel.value;
  if(val && val.startsWith('cobro:')) {
    var cId = parseInt(val.replace('cobro:',''));
    var cobro = DB.cobros.find(function(c){ return c.id===cId; });
    if(cobro) {
      pEl.value = cobro.mes;
      if(mEl) mEl.value = cobro.monto || '';
    }
  }
}

// Renderiza el historial de cobros dentro de la ficha (llamado dinámicamente)
function renderHistorialCobros(el, inqId) {
  var rows = DB.cobros.filter(function(c){
    var ct = getCt(c.ctId); return ct && ct.inqId === inqId;
  }).sort(function(a,b){ return (b.id||0)-(a.id||0); });

  if(!rows.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">Sin registros</div>';
    return;
  }
  el.innerHTML = rows.map(function(c){
    var inm = (function(){ var ct=getCt(c.ctId); return ct?getInm(ct.inmId):null; })();
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">' +
      '<div>' +
      '<div style="font-size:13px;font-weight:500">'+h(c.mes)+'</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:2px">' +
        (c.fechaPago?'Pagado el '+h(c.fechaPago):'Vence '+h(c.vence||'—')) +
        (c.medioPago?' · '+h(c.medioPago):'') +
      '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
      '<div style="font-size:14px;font-weight:600;color:var(--text)">'+fmtPeso(c.monto)+'</div>' +

function prefillLocatario(inqId) {
  if(!inqId) return;
  var inq = getInq(parseInt(inqId));
  if(!inq) return;
  var fields = {
    'loc-n': inq.nombre||'', 'loc-d': inq.dni||'',
    'loc-dom': inq.domicilio||'', 'loc-t': inq.tel||'',
    'loc-e': inq.email||''
  };
  Object.keys(fields).forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.value = fields[id];
  });
}

function selectInm(id) {
  CONTRACT_DATA.inmId = id;
  // Update all cards visually
  DB.inmuebles.forEach(function(p){
    var card = document.getElementById('s-'+p.id);
    var chk  = document.getElementById('chk-'+p.id);
    var sel  = (p.id === id);
    if(card) {
      card.style.borderColor = sel ? 'var(--gold)' : 'var(--border)';
      card.style.background  = sel ? 'var(--gold-light)' : 'var(--surface)';
    }
    if(chk) {
      chk.style.background   = sel ? 'var(--gold)' : 'transparent';
      chk.style.borderColor  = sel ? 'var(--gold)' : 'var(--border2)';
      chk.innerHTML = sel ? '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>' : '';
    }
  });
  var btn = document.getElementById('btn-ct-next');
  if(btn) btn.disabled = false;
}

function ctNext() {
  if(CONTRACT_STEP===1) {
    if(!CONTRACT_DATA.inmId){ toast('Seleccioná un inmueble','error'); return; }
    var locSel = document.getElementById('loc-sel');
    if(locSel) CONTRACT_DATA.locId = parseInt(locSel.value);
  }
  if(CONTRACT_STEP===2) {
    var n=document.getElementById('loc-n').value.trim();
    var d=document.getElementById('loc-d').value.trim();
    if(!n||!d){ toast('Completá nombre y DNI del locatario','error'); return; }
    CONTRACT_DATA.locatario = {
      nombre:n, dni:d,
      domicilio:document.getElementById('loc-dom').value,
      tel:document.getElementById('loc-t').value,
      email:document.getElementById('loc-e').value,
      estadoCivil:document.getElementById('loc-ec').value,
      ocupacion:document.getElementById('loc-oc').value
    };
    CONTRACT_DATA.garante = {
      nombre:document.getElementById('gar-n').value,
      dni:document.getElementById('gar-d').value,
      domicilio:document.getElementById('gar-dom').value,
      tel:document.getElementById('gar-t').value,
      email:document.getElementById('gar-e').value
    };
    // Save or update inquilino
    var existInq = DB.inquilinos.find(function(i){ return i.dni===CONTRACT_DATA.locatario.dni; });
    if(!existInq) {
      var newInqId = DB.inquilinos.length ? Math.max.apply(null,DB.inquilinos.map(function(i){return i.id;})) + 1 : 1;
      DB.inquilinos.push({
        id:newInqId, nombre:n, dni:d,
        tel:CONTRACT_DATA.locatario.tel,
        email:CONTRACT_DATA.locatario.email,
        domicilio:CONTRACT_DATA.locatario.domicilio,
        estadoCivil:CONTRACT_DATA.locatario.estadoCivil,
        ocupacion:CONTRACT_DATA.locatario.ocupacion,
        inmId:CONTRACT_DATA.inmId, estado:'activo',
        comprobantes:[], contrato_generado:[]
      });
      CONTRACT_DATA._newInqId = newInqId;
    } else {
      CONTRACT_DATA._newInqId = existInq.id;
    }
  }
  if(CONTRACT_STEP===3) {
    var ini=document.getElementById('co-ini').value;
    var fin=document.getElementById('co-fin').value;
    var monto=parseInt(document.getElementById('co-monto').value)||0;
    if(!ini||!fin||!monto){ toast('Completá inicio, fin y monto','error'); return; }
    CONTRACT_DATA.condiciones = {
      inicio:ini, fin:fin, monto:monto,
      deposito:document.getElementById('co-dep').value,
      diaPago:document.getElementById('co-dia').value,
      actualizacion:document.getElementById('co-act').value,
      destino:document.getElementById('co-dest').value,
      autoCobros:document.getElementById('co-autocob').value,
      clausulas:document.getElementById('co-cl').value
    };
  }
  CONTRACT_STEP = Math.min(4, CONTRACT_STEP+1);
  renderWizard();
}

function ctBack() { CONTRACT_STEP = Math.max(1, CONTRACT_STEP-1); renderWizard(); }

function n2w(n) {
  if(isNaN(n)||n===0) return 'CERO';
  var units=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte'];
  var tens=['','','veinti','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  var hunds=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n<=20) return units[n];
  if(n<100){ var t=Math.floor(n/10),u=n%10; return u===0?tens[t].replace('veinti','veinte'):(t===2?'veinti'+units[u]:tens[t]+' y '+units[u]); }
  if(n<1000){ var hh=Math.floor(n/100),r=n%100; return r===0?hunds[hh]:(hh===1?'ciento '+n2w(r):hunds[hh]+' '+n2w(r)); }
  if(n<1000000){ var mm=Math.floor(n/1000),rr=n%1000; var ms=mm===1?'mil':n2w(mm)+' mil'; return rr===0?ms:ms+' '+n2w(rr); }
  return n.toLocaleString('es-AR');
}

function fmtDate(str) {
  if(!str) return '—';
  var d=new Date(str+'T00:00:00'); return d.toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'});
}

function duracion(ini, fin) {
  if(!ini||!fin) return 'dos (2) años';
  var m=(new Date(fin).getFullYear()-new Date(ini).getFullYear())*12+(new Date(fin).getMonth()-new Date(ini).getMonth());
  if(m===24) return 'dos (2) años'; if(m===36) return 'tres (3) años'; return m+' meses';
}

function openEmitirRecibo() {
  if(!DB.contratos.length) {
    toast('No hay contratos vigentes para emitir recibos', 'error'); return;
  }
  var opts = DB.contratos.map(function(c) {
    var inq=getInq(c.inqId); var inm=getInm(c.inmId);
    return '<option value="' + c.id + '">' + c.num + ' — ' + (inq?inq.nombre:'?') + ' · ' + (inm?inm.dir.split(',')[0]:'?') + '</option>';
  }).join('');
  var hoy = new Date();
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var defaultMes = meses[hoy.getMonth()] + ' ' + hoy.getFullYear();
  // Default vencimiento = 10th of next month
  var venc = new Date(hoy.getFullYear(), hoy.getMonth(), 10);
  if(venc < hoy) venc = new Date(hoy.getFullYear(), hoy.getMonth()+1, 10);
  var defaultVenc = venc.toISOString().split('T')[0];

  var bodyEl = document.createElement('div');
  bodyEl.className = 'form-grid';
  bodyEl.innerHTML =
    '<div class="form-field full"><label>Contrato *</label>' +
    '<select id="er-ct" onchange="prefillReciboMonto()">' + opts + '</select></div>' +
    '<div class="form-field"><label>Período *</label>' +
    '<input id="er-mes" type="text" value="' + defaultMes + '" placeholder="Mayo 2025"></div>' +
    '<div class="form-field"><label>Monto ($) *</label>' +
    '<input id="er-monto" type="number" placeholder="0"></div>' +
    '<div class="form-field"><label>Fecha de vencimiento</label>' +
    '<input id="er-venc" type="date" value="' + defaultVenc + '"></div>' +
    '<div class="form-field full"><label>Observaciones</label>' +
    '<input id="er-obs" type="text" placeholder="Ej: incluye expensas, ajuste ICL, etc."></div>';

  var footer = modalFooter([{
    label: 'Emitir y descargar recibo',
    cls: 'btn-primary',
    action: function() {
      var ctId = parseInt(document.getElementById('er-ct').value);
      var mes  = document.getElementById('er-mes').value.trim();
      var monto = parseInt(document.getElementById('er-monto').value)||0;
      var vence = document.getElementById('er-venc').value;
      var obs   = document.getElementById('er-obs').value.trim();
      if(!mes || !monto) { toast('Completá período y monto','error'); return; }

      var ct  = getCt(ctId);
      var inq = ct ? getInq(ct.inqId) : null;
      var inm = ct ? getInm(ct.inmId) : null;

      // Add to DB
      var newId = DB.cobros.length ? Math.max.apply(null, DB.cobros.map(function(c){return c.id;})) + 1 : 1;
      var newCobro = { id:newId, ctId:ctId, mes:mes, monto:monto, estado:'pendiente', vence:vence, obs:obs,
        fechaEmision: new Date().toLocaleDateString('es-AR') };
      DB.cobros.push(newCobro);
      saveDB();

      // Generate and download the recibo
      generarReciboDocx(newCobro, ct, inq, inm);
      closeModal();
      nav('facturacion');
      toast('Recibo emitido y descargado','success');
    }
  }]);

  openModal('Emitir recibo de alquiler', bodyEl, false, footer);
  // Prefill monto from contract
  setTimeout(prefillReciboMonto, 100);
}

function prefillReciboMonto() {
  var sel = document.getElementById('er-ct');
  var montoEl = document.getElementById('er-monto');
  if(!sel || !montoEl) return;
  var ct = getCt(parseInt(sel.value));
  if(ct) montoEl.value = ct.monto;
}

function registrarPago(cobroId) {
  var cobro = DB.cobros.find(function(c){return c.id===cobroId;}); if(!cobro) return;
  var ct = getCt(cobro.ctId); var inq = ct?getInq(ct.inqId):null; var inm = ct?getInm(ct.inmId):null;

  var bodyEl = document.createElement('div');
  bodyEl.innerHTML =
    '<div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:16px">' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
    [['Locatario', inq?inq.nombre:'—'], ['Inmueble', inm?inm.dir.split(',')[0]:'—'],
     ['Período', cobro.mes], ['Monto', fmtPeso(cobro.monto)]].map(function(p){
      return '<div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">' + p[0] + '</div>' +
             '<div style="font-size:13px;font-weight:500">' + h(String(p[1])) + '</div></div>';
    }).join('') + '</div></div>' +
    '<div class="form-grid">' +
    '<div class="form-field"><label>Fecha de pago *</label><input id="rp-fecha" type="date" value="' + new Date().toISOString().split('T')[0] + '"></div>' +
    '<div class="form-field"><label>Medio de pago</label><select id="rp-medio"><option>Transferencia bancaria</option><option>Efectivo</option><option>Cheque</option><option>Otro</option></select></div>' +
    '<div class="form-field full"><label>Referencia / Comprobante</label><input id="rp-ref" type="text" placeholder="N° transferencia, recibo, etc."></div>' +
    '<div class="form-field full"><label>Adjuntar comprobante (opcional)</label>' +
    '<input id="rp-file" type="file" accept="image/*,.pdf" style="font-size:12px"></div>' +
    '</div>';

  var footer = modalFooter([{
    label: 'Confirmar pago y generar recibo',
    cls: 'btn-green',
    action: function() {
      var fecha = document.getElementById('rp-fecha').value;
      var medio = document.getElementById('rp-medio').value;
      var ref   = document.getElementById('rp-ref').value.trim();
      var fileEl= document.getElementById('rp-file');
      if(!fecha) { toast('Ingresá la fecha de pago','error'); return; }

      cobro.estado = 'cobrado';
      cobro.fechaPago = fecha;
      cobro.medioPago = medio;
      cobro.referencia = ref;

      // If file attached, save to inquilino's comprobantes
      var file = fileEl && fileEl.files[0];
      if(file && inq) {
        var reader = new FileReader();
        reader.onload = function(e) {
          if(!inq.comprobantes) inq.comprobantes = [];
          inq.comprobantes.push({
            name: 'Pago_' + cobro.mes.replace(/ /g,'_') + '_' + file.name,
            type: file.type, size: file.size, data: e.target.result,
            fecha: new Date().toLocaleDateString('es-AR'),
            periodo: cobro.mes, nota: medio + (ref?' · Ref: '+ref:'')
          });
          saveDB();
        };
        reader.readAsDataURL(file);
      }

      saveDB();
      // Generate recibo
      generarReciboDocx(cobro, ct, inq, inm);
      closeModal();
      nav('facturacion');
      toast('Pago registrado y recibo generado','success');
    }
  }]);

  openModal('Registrar pago — ' + cobro.mes, bodyEl, false, footer);
}

function verRecibo(cobroId) {
  var cobro = DB.cobros.find(function(c){return c.id===cobroId;}); if(!cobro) return;
  var ct = getCt(cobro.ctId); var inq = ct?getInq(ct.inqId):null; var inm = ct?getInm(ct.inmId):null;
  generarReciboDocx(cobro, ct, inq, inm);
}

async function generarReciboDocx(cobro, ct, inq, inm) {
  try {
    var D = docx;
    var j = D.AlignmentType.JUSTIFIED;
    var c = D.AlignmentType.CENTER;
    var r = D.AlignmentType.RIGHT;

    var hoy = new Date();
    var fechaEmision = cobro.fechaEmision || hoy.toLocaleDateString('es-AR');
    var fechaPago = cobro.fechaPago || null;

    function bold(txt, opts) {
      opts = opts||{};
      return new D.Paragraph({ alignment: opts.align||j, spacing:{before:opts.before||60,after:60},
        children:[new D.TextRun({text:String(txt||''),bold:true,size:opts.size||22,font:'Arial',color:opts.color||undefined})] });
    }
    function p(txt, opts) {
      opts = opts||{};
      return new D.Paragraph({ alignment: opts.align||j, spacing:{before:opts.before||60,after:60},
        children:[new D.TextRun({text:String(txt||''),size:opts.size||22,font:'Arial',color:opts.color||undefined})] });
    }
    function mx(runs, opts) {
      opts = opts||{};
      return new D.Paragraph({ alignment: opts.align||j, spacing:{before:opts.before||60,after:60}, children:runs });
    }
    function rv(txt, opts) {
      opts = opts||{};
      return new D.TextRun({text:String(txt||''),size:opts.size||22,font:'Arial',bold:opts.bold||false,color:opts.color||undefined});
    }
    function line(color) {
      return new D.Paragraph({ border:{bottom:{style:D.BorderStyle.SINGLE,size:4,color:color||'CCCCCC',space:4}}, spacing:{before:100,after:100}, children:[] });
    }

    var reciboNum = 'R-' + new Date().getFullYear() + '-' + String(cobro.id).padStart(4,'0');
    var montoLetras = n2w(cobro.monto||0).toUpperCase() + ' PESOS';

    var children = [
      // Header
      bold('RECIBO DE ALQUILER', {align:c, size:28, before:0}),
      p('Carolina Gerosa', {align:c, size:24}),
      p('25 de Mayo 498, Esquel, Chubut · Tel: 02945 462624 · alquiler@laboratoriogerosa.com.ar', {align:c, size:18, color:'777777'}),
      line('AAAAAA'),

      // Recibo number and date
      mx([rv('N° de recibo: ',{bold:true}), rv(reciboNum), rv('          Fecha de emisión: ',{bold:true}), rv(fechaEmision)], {before:120}),
      line(),

      // Inmueble y locatario
      bold('DATOS DEL ALQUILER', {before:120, size:20}),
      mx([rv('Inmueble: ',{bold:true}), rv(inm ? inm.dir : '—')]),
      mx([rv('Locatario: ',{bold:true}), rv(inq ? inq.nombre : '—'), rv('   DNI: ',{bold:true}), rv(inq ? inq.dni||'—' : '—')]),
      mx([rv('Período: ',{bold:true}), rv(cobro.mes||'—'), rv('   Contrato N°: ',{bold:true}), rv(ct ? ct.num : '—')]),
      mx([rv('Vencimiento: ',{bold:true}), rv(cobro.vence||'—')]),
      line(),

      // Monto destacado
      bold('IMPORTE', {before:120, size:20}),
      new D.Paragraph({
        alignment: c, spacing:{before:80,after:80},
        children:[new D.TextRun({text: fmtPeso(cobro.monto||0), bold:true, size:52, font:'Arial', color:'1A6B3A'})]
      }),
      p(montoLetras, {align:c, size:20}),
      line(),

      // Pago info
      bold('DATOS DEL PAGO', {before:120, size:20}),
      mx([rv('Estado: ',{bold:true}), rv(cobro.estado==='cobrado' ? '✓ COBRADO' : 'PENDIENTE DE PAGO', {color: cobro.estado==='cobrado'?'1A6B3A':'C4372A', bold:true})]),
    ];

    if(fechaPago) {
      children.push(mx([rv('Fecha de pago: ',{bold:true}), rv(fechaPago)]));
      if(cobro.medioPago) children.push(mx([rv('Medio de pago: ',{bold:true}), rv(cobro.medioPago)]));
      if(cobro.referencia) children.push(mx([rv('Referencia: ',{bold:true}), rv(cobro.referencia)]));
    }
    if(cobro.obs) children.push(mx([rv('Observaciones: ',{bold:true}), rv(cobro.obs)]));

    children = children.concat([
      line('AAAAAA'),
      p('Este recibo fue generado automáticamente por PropManager · Carolina Gerosa', {align:c, size:16, color:'AAAAAA', before:120}),
    ]);

    if(cobro.estado === 'cobrado') {
      children = children.concat([
        new D.Paragraph({spacing:{before:400,after:0},children:[]}),
        new D.Paragraph({
          alignment:c, spacing:{before:0,after:0},
          border:{top:{style:D.BorderStyle.SINGLE,size:6,color:'000000',space:6}},
          children:[new D.TextRun({text:'Firma y sello del LOCADOR',size:20,font:'Arial',color:'555555'})]
        }),
        new D.Paragraph({alignment:c,spacing:{before:4,after:0},
          children:[new D.TextRun({text:'Carolina Gerosa',size:18,font:'Arial',color:'777777'})]
        }),
      ]);
    }

    var doc = new D.Document({
      styles:{default:{document:{run:{font:'Arial',size:22}}}},
      sections:[{
        properties:{page:{size:{width:12240,height:15840},margin:{top:1440,right:1260,bottom:1440,left:1440}}},
        children:children
      }]
    });

    var buf = await D.Packer.toBlob(doc);

    // Download
    var url = URL.createObjectURL(buf);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'Recibo_' + (cobro.mes||'').replace(/ /g,'_') + '_' + (inq?inq.nombre.replace(/[^a-zA-Z0-9]/g,'_'):'') + '.docx';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);

    // Save to inquilino's comprobantes
    if(inq) {
      var blobReader = new FileReader();
      blobReader.onload = function(ev) {
        if(!inq.comprobantes) inq.comprobantes = [];
        // Check if this recibo is already saved (avoid duplicates on re-download)
        var exists = inq.comprobantes.some(function(c2){return c2.reciboId===cobro.id;});
        if(!exists) {
          inq.comprobantes.push({
            name: 'Recibo_' + (cobro.mes||'').replace(/ /g,'_') + '.docx',
            type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            data: ev.target.result,
            fecha: new Date().toLocaleDateString('es-AR'),
            periodo: cobro.mes, nota: 'Recibo ' + reciboNum,
            reciboId: cobro.id
          });
          saveDB();
        }
      };
      blobReader.readAsDataURL(buf);
    }

  } catch(err) {
    console.error('Error generando recibo:', err);
    toast('Error al generar recibo: ' + (err.message||''), 'error');
  }
}
